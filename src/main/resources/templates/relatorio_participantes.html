<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8"/>
    <title>Relatório de Participantes</title>
    <style>
        body { font-family: 'Helvetica', 'Arial', sans-serif; color: #333; margin: 40px; }
        .header { text-align: center; margin-bottom: 30px; border-bottom: 2px solid #0056b3; padding-bottom: 10px; }
        .header h1 { color: #0056b3; margin: 0; font-size: 24px; }
        .header p { margin: 5px 0 0; color: #666; font-size: 14px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px 15px; text-align: left; }
        th { background-color: #f8f9fa; color: #333; font-weight: bold; text-transform: uppercase; font-size: 12px; }
        tr:nth-child(even) { background-color: #fcfcfc; }
        .footer { position: fixed; bottom: 30px; width: 100%; text-align: center; font-size: 10px; color: #999; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Relatório de Participantes</h1>
        <p>Atividade/Evento: <strong>$nomeEvento</strong></p>
        <p>Gerado em: $dataGeracao</p>
    </div>

    <table>
        <thead>
            <tr>
                <th style="width: 40%">Nome</th>
                <th style="width: 40%">E-mail</th>
                <th style="width: 20%">RA / Situação</th>
            </tr>
        </thead>
        <tbody>
            $linhasTabela
        </tbody>
    </table>

    <div class="footer">
        Gerado pelo Sistema EvComp
    </div>
</body>
</html>

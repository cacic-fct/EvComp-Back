<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8"/>
    <title>Relatório Gráfico Comparativo</title>
    <style>
        body { font-family: 'Helvetica', 'Arial', sans-serif; color: #333; margin: 40px; }
        .header { text-align: center; margin-bottom: 30px; border-bottom: 2px solid #28a745; padding-bottom: 10px; }
        .header h1 { color: #28a745; margin: 0; font-size: 24px; }
        .header p { margin: 5px 0 0; color: #666; font-size: 14px; }
        
        .metrics-container { margin: 40px 0; text-align: center; }
        .metric-box { display: inline-block; width: 30%; border: 1px solid #ddd; border-radius: 8px; padding: 20px; margin: 0 1%; background-color: #f9f9f9; }
        .metric-box h3 { margin: 0 0 10px 0; color: #555; font-size: 16px; }
        .metric-box .number { font-size: 32px; font-weight: bold; color: #333; margin-bottom: 5px; }
        .metric-box .percent { font-size: 14px; color: #888; }
        
        .chart-container { margin: 50px auto; width: 80%; border: 1px solid #ccc; border-radius: 4px; overflow: hidden; height: 40px; background-color: #f0f0f0; }
        .chart-bar-interno { float: left; height: 100%; background-color: #007bff; text-align: center; color: white; line-height: 40px; font-weight: bold; font-size: 12px; }
        .chart-bar-externo { float: left; height: 100%; background-color: #ffc107; text-align: center; color: #333; line-height: 40px; font-weight: bold; font-size: 12px; }
        
        .legend { text-align: center; margin-top: 20px; }
        .legend-item { display: inline-block; margin: 0 15px; font-size: 14px; }
        .legend-color { display: inline-block; width: 16px; height: 16px; margin-right: 5px; vertical-align: middle; border-radius: 2px; }
        
        .footer { position: fixed; bottom: 30px; width: 100%; text-align: center; font-size: 10px; color: #999; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Relatório Comparativo: Internos x Externos</h1>
        <p>Evento: <strong>$nomeEvento</strong></p>
        <p>Gerado em: $dataGeracao</p>
    </div>

    <div class="metrics-container">
        <div class="metric-box">
            <h3>Internos (UNESP)</h3>
            <div class="number">$qtdInternos</div>
            <div class="percent">$pctInternos</div>
        </div>
        <div class="metric-box">
            <h3>Externos</h3>
            <div class="number">$qtdExternos</div>
            <div class="percent">$pctExternos</div>
        </div>
        <div class="metric-box" style="background-color: #e8f5e9; border-color: #c8e6c9;">
            <h3>Total de Inscritos</h3>
            <div class="number" style="color: #2e7d32;">$qtdTotal</div>
            <div class="percent">100%</div>
        </div>
    </div>

    <div class="chart-container">
        <div class="chart-bar-interno" style="width: $wInterno">$pctInternos</div>
        <div class="chart-bar-externo" style="width: $wExterno">$pctExternos</div>
    </div>

    <div class="legend">
        <div class="legend-item"><span class="legend-color" style="background-color: #007bff;"></span> Internos</div>
        <div class="legend-item"><span class="legend-color" style="background-color: #ffc107;"></span> Externos</div>
    </div>

    <div class="footer">
        Gerado pelo Sistema EvComp
    </div>
</body>
</html>

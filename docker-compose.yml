version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: evcomp-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: evcomp
    ports:
      - "3307:3306"
    volumes:
      - evcomp_db_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: evcomp-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - TZ=America/Sao_Paulo
      - SPRING_PROFILES_ACTIVE=mysql
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/evcomp?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      - DB_USER=${DB_USER:-root}
      - DB_PASSWORD=${DB_PASSWORD:-root}
      - SPRING_JPA_HIBERNATE_DDL_AUTO=validate
      - RESEND_API_KEY=${RESEND_API_KEY:-dummy_key}
    depends_on:
      db:
        condition: service_healthy

volumes:
  evcomp_db_data:

networks:
  default:
    name: evcomp_default